<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-color);
    background: transparent;
    padding: 0;
    overflow-x: hidden;
    word-wrap: break-word;
}
/* Light mode (default/fallback) */
:root { --text-color: #1a1a1a; --code-bg: #f4f4f5; --table-border: #ddd; --table-header-bg: #f5f5f5; }
/* Dark mode via body class */
body.dark { --text-color: #e0e0e0; --code-bg: #2a2a2a; --table-border: #444; --table-header-bg: #333; }
p { margin: 0.3em 0; }
p:first-child { margin-top: 0; }
p:last-child { margin-bottom: 0; }
strong { font-weight: 600; }
code {
    background: var(--code-bg);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
    font-size: 0.9em;
}
pre {
    background: var(--code-bg);
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
}
pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: 0.85em;
}
table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
    font-size: 0.9em;
}
th, td {
    border: 1px solid var(--table-border);
    padding: 6px 10px;
    text-align: left;
}
th { background: var(--table-header-bg); font-weight: 600; }
ul, ol { margin: 0.3em 0; padding-left: 1.5em; }
blockquote {
    border-left: 3px solid var(--table-border);
    margin: 0.5em 0;
    padding: 4px 12px;
    opacity: 0.8;
}
a { color: #1565C0; }
body.dark a { color: #9ECAFF; }
.katex { font-size: 1.05em; }
</style>
</head>
<body>
<div id="content"></div>
<script>
function render(text, isDark) {
    if (isDark) document.body.classList.add('dark');
    else document.body.classList.remove('dark');

    // Pre-process: wrap standalone $$...$$ and $...$ for KaTeX
    text = text.replace(/\$\$(.+?)\$\$/gs, (_, m) => {
        try {
            return katex.renderToString(m.trim(), { displayMode: true, throwOnError: false });
        } catch(e) { return '$$' + m + '$$'; }
    });
    text = text.replace(/\$(.+?)\$/g, (_, m) => {
        // Skip if inside a code block (handled by marked)
        try {
            return katex.renderToString(m.trim(), { displayMode: false, throwOnError: false });
        } catch(e) { return '$' + m + '$'; }
    });

    document.getElementById('content').innerHTML = marked.parse(text, { breaks: true });
}
</script>
</body>
</html>
