name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v             -keystore debug.keystore             -alias hermes             -keyalg RSA -keysize 2048 -validity 10000             -storepass android -keypass android             -dname "CN=Hermes, OU=Dev, O=Hermes, L=X, ST=X, C=CN"

      - name: Build signed APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-debug
          path: app/build/outputs/apk/debug/app-debug.apk
